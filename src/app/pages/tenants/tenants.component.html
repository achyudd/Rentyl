<!-- CONTROLS ROW  -->
<div class="flex justify-between items-end gap-3 mt-2 mb-3">
    <div class="flex items-end gap-3 ml-auto  w-full md:w-2/4 lg:w-2/6">
        <mat-form-field appearance="outline" class="searchwidth">
            <input matInput placeholder="Search tenants">
        </mat-form-field>
    </div>
    <button mat-flat-button>
        <mat-icon class="btnicon">add</mat-icon>
        <span class="btnlabel">Add Tenant</span>
    </button>

</div>

<!-- CARD CONTAINER  -->
<div class="page_scroll">
    <div>
        <div class="tablewrapper">
            <div class="tablecontainer">
                <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                    <!-- TENANT -->
                    <ng-container matColumnDef="tenant">
                        <th mat-header-cell *matHeaderCellDef> Tenant </th>
                        <td mat-cell *matCellDef="let e">
                            <div class="flex items-center gap-3">
                                <div class="avatar">{{e.initials}}</div>
                                <div class="flex flex-col">
                                    <span class="name">{{e.name}}</span>
                                    <span class="email">{{e.email}}</span>
                                </div>
                            </div>
                        </td>
                    </ng-container>

                    <!-- PROPERTY -->
                    <ng-container matColumnDef="property">
                        <th mat-header-cell *matHeaderCellDef> Property / Unit </th>
                        <td mat-cell *matCellDef="let e">
                            <div class="flex flex-col">
                                <span>{{e.property}}</span>
                                <span class="text-sm opacity-70">{{e.unit}}</span>
                            </div>
                        </td>
                    </ng-container>

                    <!-- LEASE -->
                    <ng-container matColumnDef="lease">
                        <th mat-header-cell *matHeaderCellDef> Lease Period </th>
                        <td mat-cell *matCellDef="let e">
                            <div class="flex flex-col">
                                <span>{{e.leaseStart}}</span>
                                <span class="text-sm opacity-70">→ {{e.leaseEnd}}</span>
                            </div>
                        </td>
                    </ng-container>

                    <!-- RENT -->
                    <ng-container matColumnDef="rent">
                        <th mat-header-cell *matHeaderCellDef> Rent </th>
                        <td mat-cell *matCellDef="let e">
                            {{e.rent}}
                        </td>
                    </ng-container>

                    <!-- STATUS -->
                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef> Status </th>
                        <td mat-cell *matCellDef="let e">
                            <span class="tenant_status" [ngClass]="{'active': e.status === 'Active', 'inactive': e.status === 'Inactive'}">
                                {{e.status}}
                            </span>

                        </td>
                    </ng-container>

                    <!-- ACTIONS -->
                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let e">
                            <div class="flex gap-2">
                                <button mat-stroked-button class="viewbtn">View</button>
                                <button mat-stroked-button class="removebtn">Remove</button>
                            </div>
                        </td>
                    </ng-container>

                    <!-- ROWS -->
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>

            </div>
        </div>
    </div>
</div>
