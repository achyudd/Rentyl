<div mat-dialog-title>
    <div class="flex flex-col">
        <h2>Payment History</h2>
        <p class="subtitle">Room 101</p>
    </div>
    <button mat-icon-button mat-dialog-close class="dialogclosebtn">
        <mat-icon>close</mat-icon>
    </button>
</div>

<div mat-dialog-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <!-- Month Column (with header) -->
        <ng-container matColumnDef="month">
            <th mat-header-cell *matHeaderCellDef> Month </th>
            <td mat-cell *matCellDef="let element">
                <div class="flex flex-col">
                    <span class="py_history_month">{{element.month}} </span>
                    <span class="py_history_name">{{element.name}}</span>
                </div>
            </td>
        </ng-container>

        <!-- Status Column (with header) -->
        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef class="text-right"> Payment Status </th>
            <td mat-cell *matCellDef="let element" class="text-right">
                <div class="flex flex-col">
                    <span class="py_history_status"
                        [ngClass]="{'paid': element.status === 'Paid', 'pending': element.status === 'Pending', 'overdue': element.status === 'Overdue'}">{{element.status}}
                    </span>
                    <span class="py_history_amount">{{element.amount}}</span>
                </div>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>

<div mat-dialog-actions align="end">
    <button mat-flat-button cdkFocusInitial class="">
        <span class="btnlabel">Update</span>
    </button>
</div>
